<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>身長別サイズ比較</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="header">
      <p class="header__sub">SIZE GUIDE</p>
      <h1 class="header__title">着用画像サイズ感比較</h1>
      <p class="header__desc">身長・サイズを選んで着用イメージを確認できます。<br>2つまで選択して比較できます。</p>
    </header>

    <!-- ナビゲーションボタン -->
    <div class="nav-links">
      <button class="nav-link" id="homeButton">商品画面へ</button>
    </div>

    <!-- =============================================
         性別選択
    ============================================= -->
    <div class="step" id="genderContainer">
      <h2 class="step__title"><span class="step__num">01</span>性別</h2>
      <div class="option-grid option-grid--2">
        <label class="option-card">
          <input type="radio" name="gender" value="male">
          <div class="option-card__inner">
            <div class="option-card__check">✓</div>
            <p class="option-card__label">男性</p>
          </div>
        </label>
        <label class="option-card">
          <input type="radio" name="gender" value="female">
          <div class="option-card__inner">
            <div class="option-card__check">✓</div>
            <p class="option-card__label">女性</p>
          </div>
        </label>
      </div>
    </div>

    <!-- =============================================
         着用アイテム選択
    ============================================= -->
    <div class="step" id="garmentContainer" style="display:none;">
      <h2 class="step__title"><span class="step__num">02</span>着用アイテム</h2>
      <div class="option-grid option-grid--3">
        <label class="option-card">
          <input type="radio" name="garment" value="tshirt">
          <div class="option-card__inner">
            <div class="option-card__check">✓</div>
            <p class="option-card__label">Tシャツ</p>
          </div>
        </label>
        <!-- coming-soonアイテム：追加時はdisabledとcoming-soonクラスを削除 -->
        <label class="option-card option-card--disabled">
          <input type="radio" name="garment" value="longT" disabled>
          <div class="option-card__inner">
            <div class="option-card__check">✓</div>
            <p class="option-card__label option-card__label--soon">ロンT</p>
            <p class="option-card__soon">coming soon</p>
          </div>
        </label>
        <label class="option-card option-card--disabled">
          <input type="radio" name="garment" value="sweat" disabled>
          <div class="option-card__inner">
            <div class="option-card__check">✓</div>
            <p class="option-card__label option-card__label--soon">スウェット</p>
            <p class="option-card__soon">coming soon</p>
          </div>
        </label>
      </div>
    </div>

    <!-- =============================================
         身長選択
    ============================================= -->
    <div class="step" id="heightContainer" style="display:none;">
      <h2 class="step__title"><span class="step__num">03</span>身長</h2>
      <div class="option-grid option-grid--flex" id="heightButtons">
        <!-- JSで動的に生成 -->
      </div>
    </div>

    <!-- =============================================
         ブランド・サイズ選択
    ============================================= -->
    <div class="step" id="brandContainer" style="display:none;">
      <h2 class="step__title"><span class="step__num">04</span>サイズを選択</h2>
      <p class="step__note">2つまで選択して比較できます</p>

      <div class="brand-section">
        <p class="brand-label">United Athle</p>
        <div class="option-grid option-grid--flex" id="unitedAthleButtons"></div>
      </div>

      <div class="brand-section">
        <p class="brand-label">GILDAN</p>
        <div class="option-grid option-grid--flex" id="gildanButtons"></div>
      </div>
    </div>

    <!-- =============================================
         比較画像表示エリア
    ============================================= -->
    <div id="comparisonContainer" style="display:none;">
      <div class="comparison-images" id="comparisonImages"></div>
    </div>

  </div>

  <!-- モーダル（拡大表示用） -->
  <div id="modal" class="modal">
    <button id="closeModal" class="modal__close">&times;</button>
    <button id="prevBtn" class="modal__nav modal__nav--prev">&#10094;</button>
    <img id="modalImg" class="modal__img" src="" alt="">
    <button id="nextBtn" class="modal__nav modal__nav--next">&#10095;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
