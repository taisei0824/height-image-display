<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受付停止中 - レア商品リクエスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="header">
      <h1 class="header__title">レア商品リクエスト</h1>
    </header>

    <div class="complete">
      <h2 class="complete__title">受付停止中</h2>
      <p class="complete__text">現在リクエストの受付を停止しています。<br>再開をお待ちください。</p>
    </div>

    <div class="product-grid" style="margin-top: 24px;">
      <div class="product-card__inner">
        <img src="Eye.jpg" alt="eye" class="product-card__img">
        <p class="product-card__name">eye</p>
        <p class="product-card__colors">white</p>
      </div>
      <div class="product-card__inner">
        <img src="Himawari.jpg" alt="ひまわり" class="product-card__img">
        <p class="product-card__name">ひまわり</p>
        <p class="product-card__colors">white / pink / light blue</p>
      </div>
      <div class="product-card__inner">
        <img src="JustOne.jpg" alt="JUST ONE" class="product-card__img">
        <p class="product-card__name">JUST ONE</p>
        <p class="product-card__colors">white / pink / light blue</p>
      </div>
      <div class="product-card__inner">
        <img src="GrooveOn.jpg" alt="GROOVE ON" class="product-card__img">
        <p class="product-card__name">GROOVE ON</p>
        <p class="product-card__colors">white</p>
      </div>
    </div>

  </div>

</body>
</html>
